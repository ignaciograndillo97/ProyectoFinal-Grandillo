<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermercado Online</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
</head>
<body>
    <h1 style="text-align: center;">SUPERMERCADO ONLINE</h1>
    <div class="searchbar"> 
        <div>
            <input type="text" placeholder="Buscar...">
            <i id="buscador" style="margin-left: 5px;" class="fas fa-search"></i>
        </div>
        <div>
            <p>Carrito: <span id="contadorCarrito">0</span> items - Total: $<span id="totalCarrito">0.00</span>   
            <button id="verCarritoBtn" class="btn-ver-carrito">
                    <i class="fas fa-shopping-cart"></i> Ver Carrito
            </button>
            </p>
        </div>
    </div>
    <div id="productosTotales" class="lista-productos"></div>

    <div id="modalCarrito" class="modal">
        <div class="modal-contenido">
            <div class="modal-header">
                <h2><i class="fas fa-shopping-cart"></i> Tu Carrito</h2>
                <span class="cerrar-modal">&times;</span>
            </div>
            <div class="modal-body" id="listaCarrito">
            </div>
            <div class="modal-footer">
                <div class="total-modal">
                    <strong>Total:</strong> $<span id="totalModal">0.00</span>
                </div>
                <div class="modal-botones">
                    <button id="vaciarModalBtn" class="btn-vaciar">
                        <i class="fas fa-trash"></i> Vaciar Carrito
                    </button>
                    <button id="cerrarModalBtn" class="btn-cerrar">
                        <i class="fas fa-times"></i> Cerrar
                    </button>
                    <button id="pagarBtn" class="btn-pagar">
                        <i class="fas fa-money-bill"></i> Pagar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="modalPago" class="modal">
        <div class="modal-contenido">
            <div class="modal-header">
                <h2>Datos de Pago y Envío</h2>
                <span class="cerrar-modal-pago">&times;</span>
            </div>
            <div class="modal-body">
                <div>
                    <h2>Dirección de Envío</h2>
                    <div style="border-top: 2px solid #000000; padding-top: 10px;">
                        <input type="text" id="direccion" placeholder="Dirección">
                        <select id="ciudad">
                            <option value="">Selecciona una provincia/ciudad</option>
                            <optgroup label="Provincias">
                                <option value="Buenos Aires">Buenos Aires</option>
                                <option value="CABA">CABA (Capital Federal)</option>
                                <option value="Catamarca">Catamarca</option>
                                <option value="Chaco">Chaco</option>
                                <option value="Chubut">Chubut</option>
                                <option value="Córdoba">Córdoba</option>
                                <option value="Corrientes">Corrientes</option>
                                <option value="Entre Ríos">Entre Ríos</option>
                                <option value="Formosa">Formosa</option>
                                <option value="Jujuy">Jujuy</option>
                                <option value="La Pampa">La Pampa</option>
                                <option value="La Rioja">La Rioja</option>
                                <option value="Mendoza">Mendoza</option>
                                <option value="Misiones">Misiones</option>
                                <option value="Neuquén">Neuquén</option>
                                <option value="Río Negro">Río Negro</option>
                                <option value="Salta">Salta</option>
                                <option value="San Juan">San Juan</option>
                                <option value="San Luis">San Luis</option>
                                <option value="Santa Cruz">Santa Cruz</option>
                                <option value="Santa Fe">Santa Fe</option>
                                <option value="Santiago del Estero">Santiago del Estero</option>
                                <option value="Tierra del Fuego">Tierra del Fuego</option>
                                <option value="Tucumán">Tucumán</option>
                            </optgroup>
                        </select>
                        <input type="text" id="codigoPostal" placeholder="Código Postal">
                        <input type="text" id="telefono" placeholder="Teléfono">

                    </div>
                </div>
                <div>
                    <h2>Datos de Pago</h2>
                    <div style="border-top: 2px solid #000000; padding-top: 10px;">
                        <input type="text" id="numeroTarjeta" placeholder="Número de tarjeta" minlength="15" maxlength="19">
                        <input type="text" id="fechaExpiracion" placeholder="Fecha de vencimiento (MM/AA)" maxlength="5">
                        <input type="text" id="cvv" placeholder="CVV" minlength="3" maxlength="4">
                        <input type="text" id="nombreTarjeta" placeholder="Nombre en tarjeta">
                        <button id="btnPagarAhora">Pagar Ahora</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="main.js"></script>
</body>
</html>
